<div class="row">
    <div class="col-md-6 mb-4 mb-md-0">
        <app-todo-form
        [getEditObj]="editTodoObj"
        (emitUpdatedTodo)="getUpdatedTodo($event)"
        (emitNewTodo)="getNewTodo($event)"
        ></app-todo-form>
    </div>
    <div class="col-md-6">
        <app-todo-list
        (emitEditTodo)="getEditTodo($event)" 
        (emitRemoveId)="getRemoveId($event)"
        [getTodos]="todosArr"></app-todo-list>
    </div>
</div>
