<form #todoForm="ngForm">
    <div class="card">
        <div class="card-body">
            <h3 class="font-weight-bold">
                {{isInEditMode ? 'Update Todo' : 'Add Todo'}}
            </h3>
            <div class="form-group">
                <label for="todoItem">Todo Item</label>
                <input type="text" class="form-control" required ngModel name="todoItem">
            </div>

            <div class="form-group">
                <label for="isCompleted">Is Completed</label>
                <select class="form-control" ngModel name="isCompleted">
                    <option [value]="true">Yes</option>
                    <option [value]="false">No</option>
                </select>
            </div>

            <button *ngIf="!isInEditMode" (click)="onTodoAdd()" mat-raised-button color="primary" class="btn-block">
                Add Todo
            </button>

            <button *ngIf="isInEditMode" (click)="onTodoUpdate()" mat-raised-button color="primary" class="btn-block">
                Update Todo
            </button>
        </div>
    </div>
</form>
