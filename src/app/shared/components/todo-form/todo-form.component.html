<form #todoForm="ngForm" (ngSubmit)="isInEditMode ? onTodoUpdate() : onTodoAdd()">

    <div class="card">
        <div class="card-body">
            <h3 class="font-weight-bold">
                {{isInEditMode ? 'Update Todo' : 'Add Todo'}}
            </h3>

            <div class="form-group">
                <label for="todoItem">Todo Item</label>
                <input type="text" class="form-control" required ngModel name="todoItem" #todoItem="ngModel">
                <small class="text-danger" *ngIf="todoItem.invalid && todoItem.touched">
                    Todo Item is required
                </small>
            </div>

            <div class="form-group">
                <label for="isCompleted">Is Completed</label>
                <select class="form-control" ngModel name="isCompleted">
                    <option [ngValue]="true">Yes</option>
                    <option [ngValue]="false">No</option>
                </select>
            </div>

            <button *ngIf="!isInEditMode" type="submit" [disabled]="todoForm.invalid" mat-raised-button color="primary"
                class="btn-block">
                Add Todo
            </button>

            <button *ngIf="isInEditMode" type="submit" [disabled]="todoForm.invalid" mat-raised-button color="primary"
                class="btn-block">
                Update Todo
            </button>
        </div>
    </div>
</form>
